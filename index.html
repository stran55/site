		.dropdown {

		margin-top: -10px;
		text-align: left;
		outline: none;
		width: 600px;
		position: relative;

		transform: translateX(-50%);

		.dropdown.show {

		.dropdown-item {

		line-height: 1.1;

		position: relative;
		padding-left: 100px;
		}
		.dropdown-item::before {
		content: "▶"; 
		position: absolute;
		left: 20px; 
		top: 50%;
		transform: translateY(-50%);

		font-size: 40px;
		color: #ffc76c; 
		transition: transform 0.3s ease;
		}

		.dropdown-item {
		position: relative;
		}
		.dropdown a:active .item-text {
		transform: scale(0.97) !important;
		}

		.dropdown a:hover .dropdown-item::before {

		filter: drop-shadow(0 0 6px white) drop-shadow(0 0 10px #f44703);
		transform: translateY(-50%) translateX(10px);

		}

		@keyframes expand {

		}

		}

			<script>
			function toggleDropdown(id, el) {
			const dropdown = document.getElementById(id);
			const isOpen = dropdown.classList.contains("show");

			document.querySelectorAll(".dropdown").forEach(d => {
				d.style.height = "0px";
				d.classList.remove("show");
			});

			document.querySelectorAll(".arrow").forEach(a => a.classList.remove("rotate"));

			if (!isOpen) {
				dropdown.classList.add("show");

				dropdown.style.height = dropdown.scrollHeight + "px";

				const icon = el.querySelector(".arrow");
				if (icon) icon.classList.add("rotate");
			}
			}

			document.addEventListener("click", function(e) {

			if (!e.target.closest(".dropdown-wrapper")) {
				document.querySelectorAll(".dropdown").forEach(d => {
				d.classList.remove("show");
				d.style.height = "0px"; 
				});

				document.querySelectorAll(".arrow").forEach(a => {
				a.classList.remove("rotate");
				});
			}
			});
			</script>
			<script>
			const preview = document.getElementById("projectPreview");

			preview.classList.add("show");
			const projectData = {
			"Schlieren Imaging System": {
				img: "images/schlieren_image.png",
				text: "Visualizing air flow using optical methods."
			},
			"Eddy Current Braking": {
				img: "images/brake_stop.jpg",
				text: "Magnetic braking using induced currents."
			},
			"Laser Diode Spectroscopy": {
				img: "images/laser_wave4.jpg",

			},
			"Semiconductor Characterization": {
				img: "images/hall_ln.png",

			},
			"Faraday Rotation": {
				img: "images/polarize.png",
				text: "Magnetic field effects on polarized light."
			}
			};

			let hoverTimeout;

			document.querySelectorAll(".dropdown a").forEach(item => {
			item.addEventListener("mouseenter", () => {
				const data = projectData[item.textContent.trim()];
				if (!data) return;

				clearTimeout(hoverTimeout);

				preview.style.opacity = 0;
				preview.style.transform = "translateX(-20px)";

				hoverTimeout = setTimeout(() => {
				img.src = data.img;
				text.textContent = data.text;

				preview.style.transform = "translateX(20px)";
				preview.offsetHeight;

				preview.style.opacity = 1;
				preview.style.transform = "translateX(0)";
				}, 100);
			});

			item.addEventListener("mouseleave", () => {
				clearTimeout(hoverTimeout);

				preview.style.opacity = 0;
				preview.style.transform = "translateX(0)";
			});
			});
			</script>

			<script>
			let lastClick = null;
			let lastClickTimer = null;

			document.addEventListener("click", function(e) {
			const x = e.clientX;
			const y = e.clientY;

			if (lastClick) {
				createLightning(lastClick.x, lastClick.y, x, y);
			}

			lastClick = { x, y };

			clearTimeout(lastClickTimer);
			lastClickTimer = setTimeout(() => {
				lastClick = null;
			}, 500); 
			});

			document.addEventListener("click", function(e) {
			const x = e.clientX;
			const y = e.clientY;

			const flash = document.createElement("span");
			flash.className = "click-flash";
			flash.style.left = x + "px";
			flash.style.top = y + "px";
			document.body.appendChild(flash);
			flash.addEventListener("animationend", () => flash.remove());

			if (lastClick) {
				createLightning(lastClick.x, lastClick.y, x, y);
			}

			lastClick = { x, y };
			});

			function createLightning(x1, y1, x2, y2) {
			const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
			svg.style.position = "fixed";
			svg.style.left = "0";
			svg.style.top = "0";
			svg.style.width = "100%";
			svg.style.height = "100%";
			svg.style.pointerEvents = "none";
			svg.style.zIndex = "-1";

			const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

			let d = `M ${x1} ${y1}`;
			const segments = 10;
			const dx = x2 - x1;
			const dy = y2 - y1;
			const length = Math.hypot(dx, dy);

			const perpX = -dy / length;
			const perpY = dx / length;
			for (let i = 1; i < segments; i++) {
				const t = i / segments;
				
				const offset = (Math.random() - 0.5) * 40;

				const x = x1 + dx * t + perpX * offset;
				const y = y1 + dy * t + perpY * offset;
				d += ` L ${x} ${y}`;
			}

			d += ` L ${x2} ${y2}`;
			
			path.setAttribute("d", d);
			path.setAttribute("stroke", "white");
			path.setAttribute("stroke-width", length/300 + 1);
			path.setAttribute("fill", "none");

			path.style.filter = `
			drop-shadow(0 0 6px #7a5cff)
			drop-shadow(0 0 12px #5ce1ff)
			drop-shadow(0 0 20px rgba(180, 150, 255, 0.9))
			`;
			svg.appendChild(path);
			document.body.appendChild(svg);

			svg.style.opacity = "1";
			svg.style.transition = "opacity 0.3s ease-out";

			setTimeout(() => {
				svg.style.opacity = "0";
			}, 50);

			setTimeout(() => {
				svg.remove();
			}, 350);
			}
			</script>
