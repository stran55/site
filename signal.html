<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signal Scope</title>
  <link rel="icon" type="image/png" href="images/whitebearC.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Exo+2:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    .header {
    margin-top: 30px;
    margin-bottom: 0px;
    font-size: 48px;
    color: white;
    text-shadow: 0 0 1px #f44703;
  }
    body {
      margin: 0;
      background: black;
      color: #00ff88;
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      opacity: 0;
      overflow-x: hidden !important;

    }
    .fade-in {
      animation: pageFade 0.5s ease forwards;
    }
    @keyframes pageFade {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .title {
      margin-top: px;
      font-size: 48px;
    }

    canvas {
      margin-top: 40px;
      background: black;
      width: 1000px;
      border-radius: 10px;
      border: 1px solid #00ff88;
      box-shadow: 0 0 5px #00ff88;
    }

    .controls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;

      border: 1px solid #00ff88;
      border-radius: 10px;
      box-shadow: 0 0 5px #00ff88;
      width: 1000px;

      margin-top: 30px;

      margin-left: auto;
      margin-right: auto;
    }

    .controls2 {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;

      border: 0px solid #00ff88;
      border-radius: 10px;
      box-shadow: 0 0 0px #00ff88;
      width: 1000px;

      margin-top: 30px;

      margin-left: auto;
      margin-right: auto;
    }

    .control-block {
      width: 150px;
      padding: 10px;
      border: 0px solid #00ff88;
      border-radius: 8px;
      box-shadow: 0 0 0px #00ff88;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .control-block button {
      display: inline-flex;
    }
    button {
      margin: 5px;
      padding: 10px 14px;
      background: black;
      color: #00ff88;
      border: 2px solid #00ff88;
      border-radius: 6px;
      font-family: 'Orbitron', sans-serif;
      font-size: 30px;
      cursor: pointer;
      transition:
          transform 0.08s ease,
          box-shadow 0.08s ease,
          border-color 0.08s ease;
      box-shadow:
      0 4px 0 #008855;
    }
    button:active {
    transform: translateY(4px);

    box-shadow:
      0 1px 0 #008855;

      border-color: #66ffbb;
    }
    button i {
    width: 1em;    
    text-align: center; 
  }
    .button-row {
      display: flex;
      gap: 8px;
    }
    button:hover {
      box-shadow:
        0 4px 0 #008855,
        0 0 12px #00ff88;
    }
    .label {
      font-size: 22px;  
      margin-bottom: 6px;
    }
    /*Slider bar*/
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;

      width: 120px;
      height: 10px;

      background: #000000;

      border-radius: 10px;
      border: 2px solid #00ff88;
      outline: none;


      box-shadow:
      0 4px 0 #008855;
    }

    /*Slider button*/
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;

      width: 24px;
      height: 24px;

      border-radius: 50%;

      background: #000000;
      border: 2px solid #00ff88;
      cursor: pointer;

      box-shadow:
      0 4px 0 #008855;
    }

    .display {
      margin-top: 7px;
      font-size: 30px;
      color: #88ffaa;
      text-shadow: 0 0 6px #00ff88;
    }
    #blackOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 9999;
    }
    .wide-button {
    width: 100px;
    height: 52px;

    display: flex;
    align-items: center;
    justify-content: center;
  }
    .return {
      margin-top: 50px;
      font-size: 32px;
      cursor: pointer;
      transition: transform 0.2s ease, text-shadow 0.3s ease;
    }

    .return:hover {
      transform: scale(1.05);
      text-shadow: 0 0 12px #ff6600;
    }

    .slider-row {
      margin-left: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slider-row .display {
      width: 50px;
      font-size: 20px;
      text-align: left;
    }

  </style>
</head>

<body style="opacity:0;">
<h1 class="header">Signal Generator + Oscilloscope</h1>

<canvas id="scopeCanvas" width="900" height="400"></canvas>



<div class="controls2">
<div class="control-block">

  <div class="label">Edit</div>

  <button class="wide-button" onclick="cycleEdit()">
    <span id="editButton">
      <i class="fa-solid fa-1"></i>
    </span>
  </button>

  <div class="display" id="activeDisplay"></div>

</div>
  
  <div class="control-block">
    <div class="label">Wave</div>
    <div class="button-row">
    <button onclick="prevWave()"><i class="fa-solid fa-arrow-left"></i></button>
    <button onclick="nextWave()"><i class="fa-solid fa-arrow-right"></i></button>
      </div>
    <div class="display" id="waveDisplay"></div>
  </div>
  <div class="control-block">
    <div class="label">Frequency</div>
    <div class="button-row">
  <button onclick="incFreq()"><i class="fa-solid fa-plus"></i></button>
  <button onclick="decFreq()"><i class="fa-solid fa-minus"></i></button>
  </div>
  <div class="display" id="freqDisplay"></div>
  </div>

  <div class="control-block">
  <div class="label">Amplitude</div>
  <div class="button-row">
    <button onclick="incAmp()"><i class="fa-solid fa-plus"></i></button>
    <button onclick="decAmp()"><i class="fa-solid fa-minus"></i></button>
  </div>
  <div class="display" id="ampDisplay"></div>
  </div>

  <div class="control-block">

  <div class="label">Vertical</div>

  <div class="slider-row">

    <input
      type="range"
      min="-5"
      max="5"
      step="0.10"
      value="2"
      id="offsetSlider"
      oninput="updateOffset(this.value)"
    >

    <div class="display" id="offsetDisplay"></div>

  </div>

  

  <div class="slider-row">

    <input
      type="range"
      min="-2"
      max="2"
      step="0.01"
      value="0"
      id="phaseSlider"
      oninput="updatePhase(this.value)"
    >

    <div class="display" id="phaseDisplay"></div>

  </div>
  <div class="label" style="margin-top:10px;">Horizontal</div>
</div>

</div>

<div class="controls">
<div class="control-block">
    <div class="label">Display</div>
    <div class="button-row">
      <button onclick="toggleWave(0)"><i class="fa-solid fa-1"></i></button>
      <button onclick="toggleWave(1)"><i class="fa-solid fa-2"></i></button>
    </div>
    <div class="display" id="showingDisplay"></div>
  </div>

  
    <div class="control-block">
    <div class="label">Speed</div>
    <div class="button-row">
  <button onclick="incSpeed()"><i class="fa-solid fa-plus"></i></button>
  <button onclick="decSpeed()"><i class="fa-solid fa-minus"></i></button>
  </div>
  <div class="display" id="speedDisplay"></div>
  </div>

    <div class="control-block">
    <div class="label">Mode</div>

    <div class="button-row">
      <button class="wide-button" onclick="toggleMode()">
        <span id="modeDisplay">DUAL</span>
      </button>
    </div>

    <div class="display" id="modeText"></div>
  </div>

  <div class="control-block">
    <div class="label">Time/Div</div>
    <div class="button-row">
    <button onclick="incTime()"><i class="fa-solid fa-plus"></i></button>
    <button onclick="decTime()"><i class="fa-solid fa-minus"></i></button>
    </div>
    <div class="display" id="timeDisplay"></div>
  </div>

  <div class="control-block">
    <div class="label">Volts/Div</div>
    <div class="button-row">
    <button onclick="incVolt()"><i class="fa-solid fa-plus"></i></button>
    <button onclick="decVolt()"><i class="fa-solid fa-minus"></i></button>
    </div>
    <div class="display" id="voltDisplay"></div>
    
  </div>  

</div>

<div class="controls2">
      <div class="control-block">
      <div class="label">Playback</div>
  <button class="wide-button" onclick="togglePause()"><i id="pauseIcon" class="fa-solid fa-pause"></i></button>
  <div class="display" id="pauseDisplay"></div>
  </div>


</div>
<script>
const canvas = document.getElementById("scopeCanvas");
const ctx = canvas.getContext("2d");

const gridPx = 50;

let paused = false;


let waves = [
  {
    amp: 1,
    freq: 2,
    visible: true,
    type: "Sine",
    offset: 2,
    phase: 0
  },

  {
    amp: 1,
    freq: 1,
    visible: true,
    type: "Sawtooth",
    offset: -2,
    phase: 0
  }

  
];

let activeWave = 0;


const timeSteps = [
  0.001, 0.002, 0.005,
  0.01, 0.02, 0.05,
  0.1, 0.2, 0.5,
  1, 2, 5
];
let timeIndex = 8;
let timePerDiv = timeSteps[timeIndex];


const voltSteps = [0.1, 0.2, 0.5, 1, 2, 5];
let voltIndex = 3;
let voltsPerDiv = voltSteps[voltIndex];

const freqSteps = [
  0.1, 0.2, 0.5,
  1, 2, 5,
  10, 20, 50,
  100, 200, 500
];
let freqIndex = 4;


const speedSteps = [0.12, 0.25, 0.5, 1, 2, 4, 8];
let speedIndex = 3;
let sweepSpeed = speedSteps[speedIndex];


const waveTypes = ["Sine", "Square", "Triangle", "Sawtooth"];
let waveIndex = 0;
waves[activeWave].type = waveTypes[waveIndex];

const ampSteps = [0.1, 0.2, 0.5, 1, 2, 5];
let ampIndex = 3; 

let combinedMode = false;

function toggleMode() {
  combinedMode = !combinedMode;

  document.getElementById("modeDisplay").innerHTML =
  combinedMode
    ? '<i class="fa-solid fa-wave-square"></i>'
    : '<i class="fa-solid fa-chart-line"></i>';

  document.getElementById("modeText").textContent =
    combinedMode ? "Combine" : "Dual";
}

function incFreq() {
  if (freqIndex < freqSteps.length - 1) {
    freqIndex++;
  waves[activeWave].freq = freqSteps[freqIndex];
    updateDisplay();
  }
}

function decFreq() {
  if (freqIndex > 0) {
    freqIndex--;
    waves[activeWave].freq = freqSteps[freqIndex];
    updateDisplay();
  }
}

function incSpeed() {
  if (speedIndex < speedSteps.length - 1) {
    speedIndex++;
    sweepSpeed = speedSteps[speedIndex];
    updateDisplay();
  }
}

function decSpeed() {
  if (speedIndex > 0) {
    speedIndex--;
    sweepSpeed = speedSteps[speedIndex];
    updateDisplay();
  }
}

function nextWave() {
  waveIndex = (waveIndex + 1) % waveTypes.length;
  waves[activeWave].type = waveTypes[waveIndex];
  updateDisplay();
}

function prevWave() {
  waveIndex = (waveIndex - 1 + waveTypes.length) % waveTypes.length;
  waves[activeWave].type = waveTypes[waveIndex];
  updateDisplay();
}


function toggleWave(i) {
  waves[i].visible = !waves[i].visible;
  updateDisplay();
}



function incTime() {
  if (timeIndex < timeSteps.length - 1) {
    timeIndex++;
    timePerDiv = timeSteps[timeIndex];
    updateDisplay();
  }
}

function decTime() {
  if (timeIndex > 0) {
    timeIndex--;
    timePerDiv = timeSteps[timeIndex];
    updateDisplay();
  }
}


function incVolt() {
  if (voltIndex < voltSteps.length - 1) {
    voltIndex++;
    voltsPerDiv = voltSteps[voltIndex];
    updateDisplay();
  }
}

function decVolt() {
  if (voltIndex > 0) {
    voltIndex--;
    voltsPerDiv = voltSteps[voltIndex];
    updateDisplay();
  }
}

function incAmp() {
  if (ampIndex < ampSteps.length - 1) {
    ampIndex++;
    waves[activeWave].amp = ampSteps[ampIndex];
    updateDisplay();
  }
}

function decAmp() {
  if (ampIndex > 0) {
    ampIndex--;
    waves[activeWave].amp = ampSteps[ampIndex];
    updateDisplay();
  }
}

function setActive(i) {
  activeWave = i;

  waveIndex =
    waveTypes.indexOf(waves[activeWave].type);

  ampIndex =
    ampSteps.indexOf(waves[activeWave].amp);

  document.getElementById("offsetSlider").value =
    waves[activeWave].offset;
  document.getElementById("phaseSlider").value =
  waves[activeWave].phase;
  updateDisplay();
}

function togglePause() {
  paused = !paused;

  const icon = document.getElementById("pauseIcon");

  if (paused) {
    icon.classList.replace("fa-pause", "fa-play");
  } else {
    icon.classList.replace("fa-play", "fa-pause");
  }

  updateDisplay();
}

function updateOffset(value) {

  waves[activeWave].offset =
    parseFloat(value);

  updateDisplay();
}

function updatePhase(value) {

  waves[activeWave].phase =
    parseFloat(value);
  
  updateDisplay();
}

function cycleEdit() {

  activeWave =
    activeWave === 0 ? 1 : 0;

  const editButton =
    document.getElementById("editButton");

  editButton.innerHTML =
    activeWave === 0
      ? '<i class="fa-solid fa-1"></i>'
      : '<i class="fa-solid fa-2"></i>';

  waveIndex =
    waveTypes.indexOf(waves[activeWave].type);

  ampIndex =
    ampSteps.indexOf(waves[activeWave].amp);

  document.getElementById("offsetSlider").value =
    waves[activeWave].offset;

  document.getElementById("phaseSlider").value =
    waves[activeWave].phase;

  updateDisplay();
}

function drawGrid() {
  ctx.save();

  ctx.strokeStyle = "#113322";
  ctx.lineWidth = 1;
  ctx.shadowBlur = 0;
  ctx.shadowColor = "transparent";

  for (let x = 0; x < canvas.width; x += gridPx) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }

  for (let y = 0; y < canvas.height; y += gridPx) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  ctx.restore();
}


let time = 0;

function getWaveValue(type, freq, t) {
  switch (type) {
    case "Sine":
      return Math.sin(2 * Math.PI * freq * t);

    case "Square":
      return Math.sign(Math.sin(2 * Math.PI * freq * t));

    case "Triangle":
      return 2 * Math.asin(Math.sin(2 * Math.PI * freq * t)) / Math.PI;

    case "Sawtooth":
      return 2 * (t * freq - Math.floor(t * freq + 0.5));
  }
}

function drawWave() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawGrid();

if (combinedMode) {

  ctx.beginPath();

  for (let x = 0; x < canvas.width; x++) {

    let t =
      time +
      (x / gridPx) * timePerDiv;

    let yTotal = 0;

    waves.forEach((wave) => {

      if (!wave.visible) return;

      yTotal +=
      wave.amp *
      getWaveValue(
        wave.type,
        wave.freq,
        t + wave.phase
      );

    });

let yPos =
  canvas.height / 2 -
  (yTotal / voltsPerDiv) * gridPx;

    if (x === 0) ctx.moveTo(x, yPos);
    else ctx.lineTo(x, yPos);
  }

  ctx.strokeStyle = "#00ff88";
  ctx.lineWidth = 2;
  ctx.shadowBlur = 10;
  ctx.shadowColor = "#00ff88";
  ctx.stroke();

}

else {

  waves.forEach((wave, i) => {

    if (!wave.visible) return;

    ctx.beginPath();

    for (let x = 0; x < canvas.width; x++) {

      let t =
        time +
        wave.phase +
        (x / gridPx) * timePerDiv;

      let y =
        wave.amp *
        getWaveValue(wave.type, wave.freq, t);

      let yPos =
      canvas.height / 2 -
      ((y + wave.offset) / voltsPerDiv) * gridPx;

      if (x === 0) ctx.moveTo(x, yPos);
      else ctx.lineTo(x, yPos);
    }

    ctx.strokeStyle = "#00ff88";

    ctx.globalAlpha =
      i === activeWave ? 1 : 0.4;

    ctx.lineWidth =
      i === activeWave ? 3 : 2;

    ctx.shadowBlur = 10;
    ctx.shadowColor = "#00ff88";

    ctx.stroke();

    ctx.globalAlpha = 1;
  });

}

  if (!paused) {
    time += (0.01 / timePerDiv) * sweepSpeed;
  }

  requestAnimationFrame(drawWave);
}

function updateDisplay() {
  document.getElementById("timeDisplay").textContent = timePerDiv + " s";
  document.getElementById("voltDisplay").textContent = voltsPerDiv + " V";
  document.getElementById("freqDisplay").textContent =
    waves[activeWave].freq + " Hz";
  document.getElementById("speedDisplay").textContent = sweepSpeed + "x";
  document.getElementById("pauseDisplay").textContent =
    paused ? "Paused" : "Running";
  document.getElementById("waveDisplay").textContent =
  waves[activeWave].type;

  let showingText;
  if (waves[0].visible && waves[1].visible) {
    showingText = "Both";
  } else if (waves[0].visible) {
    showingText = "Wave 1";
  } else if (waves[1].visible) {
    showingText = "Wave 2";
  } else {
    showingText = "None";
  }
  document.getElementById("showingDisplay").textContent =
    /*"Showing: " + */showingText;
  document.getElementById("activeDisplay").textContent =
    "Editing: " + (activeWave + 1);
  document.getElementById("ampDisplay").textContent =
  waves[activeWave].amp + " V";
  document.getElementById("modeDisplay").innerHTML =
  combinedMode
    ? '<i class="fa-solid fa-wave-square"></i>'
    : '<i class="fa-solid fa-chart-line"></i>';

  document.getElementById("modeText").textContent =
    combinedMode ? "Combine" : "Dual";

  document.getElementById("offsetDisplay").textContent =
  waves[activeWave].offset.toFixed(1);

  document.getElementById("phaseDisplay").textContent =
  waves[activeWave].phase.toFixed(1);

  
}
updateDisplay();
drawWave();
</script>

  <a href="#" onclick="fadeAndRedirect('index.html#main'); return false;" style="text-decoration: none; color: white;">
  <h2 class="return">
    <span style="margin-left: 10px; margin-right: 6px">Return</span>
    <i class="fa-solid fa-right-from-bracket"></i>
  </h2>
</a>
</body>
<div id="blackOverlay"></div>
<script>
  function fadeAndRedirect(url) {
    const overlay = document.getElementById("blackOverlay");
    overlay.style.opacity = "1";
    overlay.style.pointerEvents = "auto";

    setTimeout(() => {
      window.location.href = url;
    }, 250); 
  }


</script>
<script>
window.addEventListener("pageshow", () => {

  document.body.classList.remove("fade-in");

  void document.body.offsetWidth;

  document.body.classList.add("fade-in");

});
</script>


</html>
