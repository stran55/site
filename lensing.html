<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<title>Gravitational Lensing</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root {

    --theme: #ffd24a;
    --theme-dark: #8a3d00;
    --theme-glow: #ff5e00;
    --theme-light: #fff1b0;

    --background: #000000;

    --grid: #2b1000;
}

body {

    margin: 0;

    background: var(--background);

    color: var(--theme);

    font-family: 'Orbitron', sans-serif;

    text-align: center;

    overflow-x: hidden;

    opacity: 0;

    animation: pageFade 1s ease forwards;
    animation-delay: 0.1s;

}
@keyframes pageFade {
  from {
    opacity: 0;
  }

  to {
    opacity: 1;
  }
}

#blackOverlay {

    position: fixed;

    inset: 0;

    background: black;

    opacity: 0;

    pointer-events: none;

    transition:
        opacity 0.25s ease;

    z-index: 9999;
}


.header {

    margin-top: 30px;

    font-size: 52px;

    color: white;

    text-shadow:
        0 0 0px var(--theme-glow);
}

.display-box {

    position: relative;

    width: 1000px;

    margin: 40px auto 0 auto;

    border: 2px solid var(--theme);

    border-radius: 12px;

    box-shadow:
        0 0 5px var(--theme-glow);

    overflow: hidden;

    background: var(--background);
}

canvas {

    display: block;

    width: 1000px;
    height: 600px;

    background: black;
}

.display-data {

    position: absolute;

    right: 20px;
    bottom: 20px;

    text-align: right;

    font-size: 18px;

    color: var(--theme-light);

    text-shadow:
        0 0 8px var(--theme-glow);

    line-height: 1.6;

    background:
        rgba(0,0,0,0.35);

    padding: 12px 16px;

    border-radius: 8px;

    border:
        1px solid rgba(255,255,255,0.08);

    backdrop-filter:
        blur(4px);
}

.distance-scale {

    position: absolute;

    left: 60px;
    right: 60px;

    bottom: 50px;

    height: 120px;

    pointer-events: none;
}

/* MAIN LINE */

.distance-line {

    position: absolute;

    left: 0;

    width: 100%;

    top: 36px;

    height: 6px;

    background:
        linear-gradient(
            to right,
            transparent,
            var(--theme),
            transparent
        );

    box-shadow:
        0 0 12px var(--theme-glow);
}


.observer-marker {

    left: 0%;
}

.marker-dot {

    width: 24px;
    height: 24px;

    border-radius: 50%;

    background: var(--theme);

    box-shadow:
        0 0 16px var(--theme-glow);

    margin: auto;
}

.marker-label {

    position: absolute;

    bottom: 26px;

    left: 50%;

    transform: translateX(-50%);

    font-size: 16px;

    color: var(--theme-light);

    text-shadow:
        0 0 8px var(--theme-glow);

    white-space: nowrap;
}

/* DISTANCE BARS */

.distance-bars {

    position: absolute;

    width: 100%;
  
    top: 50px;

    left: 0;
}

.distance-bar {

    position: absolute;

    height: 2px;

    border-radius: 20px;

    transition:
        left 0.25s ease,
        width 0.25s ease;

    box-shadow:
        0 0 12px currentColor;
}



.bar-cap {

    position: absolute;

    width: 3px;

    height: 16px;

    top: -6px;

    background: currentColor;

    box-shadow:
        0 0 10px currentColor;
}

.left-cap {

    left: 0;
}

.right-cap {

    right: 0;
}

/* LABELS */

.distance-bar span {

    position: absolute;

    left: 50%;

    top: 12px;

    transform:
        translateX(-50%);

    font-size: 16px;

    color: var(--theme-light);

    white-space: nowrap;

    text-shadow:
        0 0 8px currentColor;
}

/* INDIVIDUAL BARS */

.dl-bar {

    top: 28px;

    background: #ffb347;

    color: #ffb347;
}

.dls-bar {

    top: 28px;

    background: #ffd885;

    color: #ffd885;
}

.ds-bar {

    top: 72px;

    background: #ffe066;

    color: #ffe066;
}
.distance-marker {

    position: absolute;

    top: 32px;

    transform: translateX(-50%);

    transition:
        left 0.25s ease;
}

.marker-dot {

    width: 14px;
    height: 14px;

    border-radius: 50%;

    background: var(--theme);

    box-shadow:
        0 0 12px var(--theme-glow);

    margin: auto;
}

.marker-label {

    margin-top: 8px;

    font-size: 16px;

    color: var(--theme-light);

    text-shadow:
        0 0 8px var(--theme-glow);

    white-space: nowrap;
}

.controls {

    width: 970px;

    margin: 30px auto;

    display: flex;

    justify-content: center;

    flex-wrap: wrap;

    gap: 18px;

    border: 2px solid var(--theme);

    border-radius: 10px;

    padding: 16px;

    box-shadow:
        0 0 5px var(--theme-glow);
}

.control-block {

    width: 200px;

    padding: 10px;

    display: flex;

    flex-direction: column;

    align-items: center;
}

.label {

    font-size: 22px;

    margin-bottom: 10px;
}

.display {

    margin-top: 10px;

    font-size: 30px;

    color: var(--theme-light);

    text-shadow:
        0 0 8px var(--theme-glow);
}

input[type="range"] {

    -webkit-appearance: none;

    width: 130px;

    height: 10px;

    background: var(--background);

    border-radius: 10px;

    border: 2px solid var(--theme);

    box-shadow:
        0 4px 0 var(--theme-dark);
}

input[type="range"]::-webkit-slider-thumb {

    -webkit-appearance: none;

    width: 24px;
    height: 24px;

    border-radius: 50%;

    background: black;

    border: 2px solid var(--theme);

    cursor: pointer;

    box-shadow:
        0 4px 0 var(--theme-dark);
}
.source-coords {

    position: absolute;

    top: 18px;
    right: 20px;

    text-align: right;

    font-size: 16px;

    line-height: 1.5;

    color: var(--theme-light);

    text-shadow:
        0 0 8px var(--theme-glow);

    background:
        rgba(0,0,0,0.35);

    padding: 10px 14px;

    border-radius: 8px;

    border:
        1px solid rgba(255,255,255,0.08);

    backdrop-filter:
        blur(4px);
}
.info {

    position: absolute;

    top: 18px;

    left: 20px;

    z-index: 10;

    color: var(--theme-light);

    font-size: 16px;

    text-shadow:
        0 0 8px var(--theme-glow);

    background:
        rgba(0,0,0,0.35);

    padding: 10px 14px;

    border-radius: 8px;

    border:
        1px solid rgba(255,255,255,0.08);

    backdrop-filter:
        blur(4px);
}

    .return {
      margin-top: 50px;
      font-size: 32px;
      cursor: pointer;
      transition: transform 0.2s ease, text-shadow 0.3s ease;
    }

    .return:hover {
      transform: scale(1.05);
      text-shadow: 0 0 12px #ff6600;
    }
</style>
</head>

<body style="opacity:0;">

<h1 class="header">
    Singular Isothermal Ellipsoid
</h1>

<div class="display-box">

    <div class="info">
      Drag on the display to move the source.
    </div>

    <canvas id="lensCanvas"
            width="1000"
            height="600">
    </canvas>
    <div class="source-coords"
        id="sourceCoords">

        βx: 0.20<br>
        βy: 0.10

    </div>

    <div class="distance-scale">

      <div class="distance-line"></div>

      <!-- MARKERS -->

      <div class="distance-marker observer-marker">

          <div class="marker-dot"></div>

          <div class="marker-label">
              Observer
          </div>

      </div>

      <div class="distance-marker lens-marker"
          id="lensMarker">

          <div class="marker-dot"></div>

          <div class="marker-label">
              Lens
          </div>

      </div>

      <div class="distance-marker source-marker"
          id="sourceMarker">

          <div class="marker-dot"></div>

          <div class="marker-label">
              Source
          </div>

      </div>

      <!-- DISTANCE BARS -->

      <div class="distance-bars">

          <!-- DL -->

          <div class="distance-bar dl-bar"
              id="DLBar">

              <div class="bar-cap left-cap"></div>
              <div class="bar-cap right-cap"></div>

              <span id="DLLabel"></span>

          </div>

          <!-- DLS -->

          <div class="distance-bar dls-bar"
              id="DLSBar">

              <div class="bar-cap left-cap"></div>
              <div class="bar-cap right-cap"></div>

              <span id="DLSLabel"></span>

          </div>

          <!-- DS -->

          <div class="distance-bar ds-bar"
              id="DSBar">

              <div class="bar-cap left-cap"></div>
              <div class="bar-cap right-cap"></div>

              <span id="DSLabel"></span>

          </div>

      </div>

  </div>
      


</div>

<div class="controls">

    <div class="control-block">

        <div class="label">
            Dispersion
        </div>

        <input type="range"
               id="sigmaV"
               min="50"
               max="400"
               step="1"
               value="250">

        <div class="display"
             id="sigmaVValue">
        </div>

    </div>


    <div class="control-block">

        <div class="label">
            Ellipticity
        </div>

        <input type="range"
               id="ellipticity"
               min="0.1"
               max="0.99"
               step="0.01"
               value="0.6">

        <div class="display"
             id="ellipticityValue">
        </div>

    </div>

    <div class="control-block">

        <div class="label">
            Angle
        </div>

        <input type="range"
               id="phi"
               min="0"
               max="180"
               step="1"
               value="0">

        <div class="display"
             id="phiValue">
        </div>

    </div>

    <div class="control-block">

        <div class="label">
            Source Size
        </div>

        <input type="range"
               id="sigma"
               min="0.02"
               max="0.3"
               step="0.01"
               value="0.08">

        <div class="display"
             id="sigmaValue">
        </div>

    </div>

</div>
<div class="controls">
    <div class="control-block">

        <div class="label">
            Lens Z
        </div>

        <input type="range"
               id="zLens"
               min="0.01"
               max="3"
               step="0.01"
               value="0.2">

        <div class="display"
             id="zLensValue">
        </div>

    </div>

    <div class="control-block">

        <div class="label">
            Source Z
        </div>

        <input type="range"
               id="zSource"
               min="0.05"
               max="6"
               step="0.01"
               value="1.0">

        <div class="display"
             id="zSourceValue">
        </div>

    </div>
</div>



<script>

const canvas =
    document.getElementById("lensCanvas");

const ctx =
    canvas.getContext("2d");

const H0 = 70;

const c = 299792.458;

const OM = 0.3;
const OV = 0.7;
const OK = 1 - OM - OV;

let sourceX = 0.2;
let sourceY = 0.1;

const scale = 4;

function getTheme(variable) {

    return getComputedStyle(
        document.documentElement
    ).getPropertyValue(variable);
}

function E(z) {

    return Math.sqrt(
        OM * (1 + z)**3 +
        OK * (1 + z)**2 +
        OV
    );
}

function integrate(func,
                   zMax,
                   steps = 1000) {

    let sum = 0;

    const dz = zMax / steps;

    for (let i = 0;
         i < steps;
         i++) {

        const z = i * dz;

        sum += func(z) * dz;
    }

    return sum;
}

function comovingDistance(z) {

    const DH = c / H0;

    return DH * integrate(
        zVal => 1 / E(zVal),
        z
    );
}

function angularDistance(z) {

    return comovingDistance(z)
        / (1 + z);
}

function angularDistanceLS(zL, zS) {

    return (
        comovingDistance(zS)
        - comovingDistance(zL)
    ) / (1 + zS);
}

function radToArcsec(rad) {

    return rad * 206265;
}

function gaussian(x,
                  y,
                  sx,
                  sy,
                  sigma) {

    return Math.exp(
        -((x - sx)**2 +
        (y - sy)**2) /
        (2 * sigma**2)
    );
}

function deflection(thetaX,
                    thetaY,
                    thetaE,
                    f,
                    phiDeg) {

    const phi =
        phiDeg * Math.PI / 180;

    const cos = Math.cos(phi);
    const sin = Math.sin(phi);

    const xRot =
        thetaX * cos +
        thetaY * sin;

    const yRot =
        -thetaX * sin +
        thetaY * cos;

    const eps = 1e-6;

    const phi_r =
        Math.sqrt(
            f*f*xRot*xRot +
            yRot*yRot
        ) + eps;

    const fPrime =
        Math.sqrt(1 - f*f + eps);

    const alphaXRot =

        (thetaE * f / fPrime) *

        Math.atan(
            (fPrime * xRot) /
            phi_r
        );

    const alphaYRot =

        (thetaE * f / fPrime) *

        Math.atanh(
            (fPrime * yRot) /
            phi_r
        );

    const alphaX =
        alphaXRot * cos -
        alphaYRot * sin;

    const alphaY =
        alphaXRot * sin +
        alphaYRot * cos;

    return {
        x: alphaX,
        y: alphaY
    };
}

function drawGrid() {

    ctx.strokeStyle =
        getTheme('--grid');

    ctx.lineWidth = 1;

    const spacing = 50;

    for (let x = 0;
         x < canvas.width;
         x += spacing) {

        ctx.beginPath();

        ctx.moveTo(x, 0);

        ctx.lineTo(
            x,
            canvas.height
        );

        ctx.stroke();
    }

    for (let y = 0;
         y < canvas.height;
         y += spacing) {

        ctx.beginPath();

        ctx.moveTo(0, y);

        ctx.lineTo(
            canvas.width,
            y
        );

        ctx.stroke();
    }
}

function renderLens() {

    document.getElementById(
    "sourceCoords"
    ).innerHTML =

        "βx: " +
        sourceX.toFixed(2) +

        "<br>" +

        "βy: " +
        sourceY.toFixed(2);

    const sigmaV =
        parseFloat(
            document.getElementById(
                "sigmaV"
            ).value
        );

    let zL =
        parseFloat(
            document.getElementById(
                "zLens"
            ).value
        );

    let zS =
        parseFloat(
            document.getElementById(
                "zSource"
            ).value
        );

    const zLensSlider =
        document.getElementById("zLens");

    const zSourceSlider =
        document.getElementById("zSource");

    zLensSlider.max =
        (zS - 0.01).toFixed(2);

    zSourceSlider.min =
        (zL + 0.01).toFixed(2);
    
    

/* Prevent source from going below lens */

    if (zS <= zL) {

    zS = zL + 0.01;

    zSourceSlider.value =
        zS.toFixed(2);
    }

    /* Prevent lens from exceeding source */

    if (zL >= zS) {

        zL = zS - 0.01;

        zLensSlider.value =
            zL.toFixed(2);
    }

    const finalZL =
    parseFloat(zLensSlider.value);

    const finalZS =
    parseFloat(zSourceSlider.value);

    const f =
        parseFloat(
            document.getElementById(
                "ellipticity"
            ).value
        );

    const phi =
        parseFloat(
            document.getElementById(
                "phi"
            ).value
        );

    const sigma =
        parseFloat(
            document.getElementById(
                "sigma"
            ).value
        );

    const DL =
    angularDistance(zL);

    const DS =
        angularDistance(zS);
    
    const DLS =
        angularDistanceLS(zL, zS);

    const DL_comoving =
        comovingDistance(zL);

    const DS_comoving =
        comovingDistance(zS);

    const DLS_comoving =
        DS_comoving - DL_comoving;



    const maxDistance =
    Math.max(
        DS_comoving,
        DL_comoving,
        1
    );

    const lensPercent =
        (DL_comoving / maxDistance) * 100;

    const sourcePercent =
        (DS_comoving / maxDistance) * 100;

    const lineScale = 1.00;

    const observerOffset = 0;

    const lensPos =
        observerOffset +
        lensPercent * lineScale;

    const sourcePos =
        observerOffset +
        sourcePercent * lineScale;
    const lensMarker =
        document.getElementById(
            "lensMarker"
        );

    const sourceMarker =
        document.getElementById(
            "sourceMarker"
        );

    lensMarker.style.left =
        lensPos + "%";

    sourceMarker.style.left =
        sourcePos + "%";

    const DLBar =
    document.getElementById("DLBar");

    const DSBar =
        document.getElementById("DSBar");

    const DLSBar =
        document.getElementById("DLSBar");

    DLBar.style.left =
        observerOffset + "%";

    DLBar.style.width =
        (lensPos - observerOffset) + "%";

    DSBar.style.left =
        observerOffset + "%";

    DSBar.style.width =
        (sourcePos - observerOffset) + "%";

    DLSBar.style.left =
        lensPos + "%";

    DLSBar.style.width =
        (sourcePos - lensPos) + "%";

    document.getElementById("DLLabel")
        .textContent =
        "" +
        DL_comoving.toFixed(0) +
        " Mpc";

    document.getElementById("DSLabel")
        .textContent =
        "" +
        DS_comoving.toFixed(0) +
        " Mpc";

    document.getElementById("DLSLabel")
        .textContent =
        "" +
        DLS_comoving.toFixed(0) +
        " Mpc";


    const thetaE_rad =

        4 * Math.PI *

        (sigmaV / c)**2 *

        (DLS / DS);

    const thetaE =
        radToArcsec(thetaE_rad);

    document.getElementById(
        "sigmaVValue"
    ).textContent =
        sigmaV.toFixed(0)
        + " km/s";

    document.getElementById(
        "zLensValue"
    ).textContent =
        zL.toFixed(2);

    document.getElementById(
        "zSourceValue"
    ).textContent =
        zS.toFixed(2);

    document.getElementById(
        "ellipticityValue"
    ).textContent =
        f.toFixed(2);

    document.getElementById(
        "phiValue"
    ).textContent =
        phi.toFixed(0) + "°";

    document.getElementById(
        "sigmaValue"
    ).textContent =
        sigma.toFixed(2);

    const width =
        canvas.width;

    const height =
        canvas.height;

    const image =
        ctx.createImageData(
            width,
            height
        );

    const data =
        image.data;

    for (let py = 0;
         py < height;
         py++) {

        for (let px = 0;
             px < width;
             px++) {

            const thetaX =

                (px / width - 0.5)
                * 2 * scale;

            const thetaY =

            -((py / height) - 0.5)
            * 2 * scale;

            const alpha =
                deflection(
                    thetaX,
                    thetaY,
                    thetaE,
                    f,
                    phi
                );

            const betaX =
                thetaX - alpha.x;

            const betaY =
                thetaY - alpha.y;

            const intensity =
                gaussian(
                    betaX,
                    betaY,
                    sourceX,
                    sourceY,
                    sigma
                );

            const brightness =
                Math.min(
                    255,
                    intensity * 900
                );

            let r, g, b;

            if (brightness < 85) {

                r = brightness * 3;
                g = 0;
                b = 0;
            }

            else if (
                brightness < 170
            ) {

                r = 255;

                g =
                    (brightness - 85)
                    * 3;

                b = 0;
            }

            else {

                r = 255;

                g = 255;

                b =
                    (brightness - 170)
                    * 3;
            }

            const index =
                (py * width + px)
                * 4;

            data[index] =
                Math.min(255, r);

            data[index + 1] =
                Math.min(255, g);

            data[index + 2] =
                Math.min(255, b);

            data[index + 3] =
                255;
        }
    }

    ctx.putImageData(
        image,
        0,
        0
    );

    drawGrid();
}

canvas.addEventListener(
    "mousemove",
    e => {

    if (e.buttons !== 1)
        return;

    const rect =
        canvas.getBoundingClientRect();

    const x =
        e.clientX - rect.left;

    const y =
        e.clientY - rect.top;

    sourceX =
        ((x / canvas.width)
        - 0.5)
        * 2 * scale;

    sourceY =
      -((y / canvas.height) - 0.5)
      * 2 * scale;

    renderLens();
});

document
.querySelectorAll("input")
.forEach(input => {

    input.addEventListener(
        "input",
        () => requestAnimationFrame(renderLens)
    );
});

renderLens();

</script>


<a href="#"
   onclick="fadeAndRedirect('index.html#main'); return false;"
   style="
      text-decoration: none;
      color: white;
   ">
    <h2 class="return">
        <span style="
            margin-left: 10px;
            margin-right: 6px;
        ">
            Return
        </span>
        <i class="fa-solid fa-right-from-bracket"></i>
    </h2>
</a>
<div id="blackOverlay"></div>

<script>

function fadeAndRedirect(url) {

    const overlay =
        document.getElementById(
            "blackOverlay"
        );

    overlay.style.opacity = "1";

    overlay.style.pointerEvents =
        "auto";

    document.body.style.opacity = "0";

    setTimeout(() => {

        window.location.href = url;

    }, 250);
}



</script>



</body>
</html>
